<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>位取りボード（整数：一兆の位まで）</title>
<style>
:root{
  --bg:#f7f8fb;
  --card:#ffffff;
  --line:#d7dce5;
  --text:#111827;
  --muted:#cbd5e1;
  --blue:#2563eb;
  --red:#dc2626;
  --shadow:0 6px 18px rgba(15,23,42,.08);
}
*{box-sizing:border-box}
html,body{
  width:100%;
  height:100%;
  margin:0;
  overflow:hidden;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
  background:linear-gradient(180deg,#fff 0%,var(--bg) 100%);
  color:var(--text);
}
.app{
  height:100dvh;
  width:100vw;
  padding:clamp(6px,1.2vw,14px);
  display:grid;
  grid-template-rows:auto auto 1fr;
  gap:clamp(6px,1.1vw,12px);
}
.header{
  display:grid;
  grid-template-columns:1fr auto auto;
  align-items:center;
  gap:10px;
}
h1{
  margin:0;
  font-size:clamp(18px,2.4vw,34px);
  white-space:nowrap;
}
.top-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:14px;
  box-shadow:var(--shadow);
  padding:clamp(8px,1.2vw,16px);
  display:grid;
  grid-template-columns:auto 1fr;
  gap:12px;
  align-items:center;
}
.label{
  color:#0f5bbf;
  font-weight:900;
  font-size:clamp(16px,1.8vw,24px);
  white-space:nowrap;
}
.number{
  font-weight:950;
  font-size:clamp(28px,5.2vw,70px);
  letter-spacing:.03em;
  line-height:1;
  text-align:center;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:clip;
}
.minus-sign{
  color:#111827;
  padding-right:.08em;
}
.zero-muted{color:var(--muted)}
button{
  border:0;
  border-radius:10px;
  font-weight:900;
  cursor:pointer;
  touch-action:manipulation;
  user-select:none;
}
.main-btn{
  padding:clamp(9px,1vw,14px) clamp(12px,1.4vw,20px);
  font-size:clamp(14px,1.3vw,18px);
  background:#fff;
  border:1px solid var(--line);
  white-space:nowrap;
}
.help{color:#0f5bbf}
.clear{background:#e11d48;color:#fff;border-color:#e11d48}
.board-wrap{
  min-height:0;
  overflow:hidden;
  border-radius:14px;
  border:1px solid var(--line);
  background:#fff;
  box-shadow:var(--shadow);
}
.board{
  height:100%;
  display:grid;
  grid-template-columns:repeat(13,1fr);
}
.place{
  min-width:0;
  border-right:1px solid var(--line);
  display:grid;
  grid-template-rows:auto 1fr auto auto;
}
.place:last-child{border-right:0}
.head{
  min-height:clamp(42px,8.5vh,74px);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-weight:950;
  font-size:clamp(14px,1.55vw,25px);
  line-height:1.08;
  border-bottom:1px solid var(--line);
  text-align:center;
}
.pow{
  font-size:clamp(10px,1.05vw,16px);
  margin-top:2px;
}
.dots{
  min-height:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:clamp(4px,.8vw,10px) 2px;
  border-bottom:1px solid var(--line);
}
.dotbox{
  height:100%;
  display:grid;
  grid-template-rows:repeat(10,1fr);
  align-items:center;
  justify-items:center;
  gap:clamp(2px,.45vh,7px);
}
.dot{
  width:min(2.25vw,3.5vh,28px);
  height:min(2.25vw,3.5vh,28px);
  min-width:11px;
  min-height:11px;
  border-radius:50%;
  border:2px solid currentColor;
}
.filled{
  box-shadow:inset 0 -3px 6px rgba(0,0,0,.18),0 2px 5px rgba(0,0,0,.12);
}
.empty{
  color:#d7dce5 !important;
  background:transparent !important;
  opacity:.95;
}
.count{
  height:clamp(28px,5.4vh,46px);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(16px,1.8vw,26px);
  font-weight:950;
  border-bottom:1px solid var(--line);
}
.ops{
  height:clamp(76px,14vh,120px);
  display:grid;
  grid-template-rows:1fr 1fr;
  gap:clamp(4px,.75vh,8px);
  padding:clamp(5px,.8vw,10px);
}
.op{
  font-size:clamp(15px,1.55vw,24px);
  padding:0;
  border:1.5px solid;
  background:#fff;
}
.plus{color:var(--blue);border-color:#60a5fa}
.minus{color:var(--red);border-color:#fb7185}
dialog{
  width:min(720px,92vw);
  border:0;
  border-radius:16px;
  padding:0;
  box-shadow:0 24px 80px rgba(0,0,0,.25);
}
dialog::backdrop{background:rgba(15,23,42,.45)}
.modal{
  padding:22px 26px;
}
.modal h2{margin:0 0 12px;color:#0f5bbf}
.modal li{margin:8px 0}
.close{
  margin-top:12px;
  width:100%;
  padding:14px;
  background:#2563eb;
  color:white;
  font-size:16px;
}
.c0{color:#6d28d9}.b0{background:#6d28d9;background-color:#6d28d9}
.c1{color:#7c3aed}.b1{background:#7c3aed;background-color:#7c3aed}
.c2{color:#2563eb}.b2{background:#2563eb;background-color:#2563eb}
.c3{color:#0284c7}.b3{background:#0284c7;background-color:#0284c7}
.c4{color:#0891b2}.b4{background:#0891b2;background-color:#0891b2}
.c5{color:#059669}.b5{background:#059669;background-color:#059669}
.c6{color:#16a34a}.b6{background:#16a34a;background-color:#16a34a}
.c7{color:#65a30d}.b7{background:#65a30d;background-color:#65a30d}
.c8{color:#ca8a04}.b8{background:#ca8a04;background-color:#ca8a04}
.c9{color:#d97706}.b9{background:#d97706;background-color:#d97706}
.c10{color:#ea580c}.b10{background:#ea580c;background-color:#ea580c}
.c11{color:#dc2626}.b11{background:#dc2626;background-color:#dc2626}
.c12{color:#db2777}.b12{background:#db2777;background-color:#db2777}
.h0{background:#f3e8ff}.h1{background:#ede9fe}.h2{background:#dbeafe}.h3{background:#e0f2fe}
.h4{background:#cffafe}.h5{background:#d1fae5}.h6{background:#dcfce7}.h7{background:#ecfccb}
.h8{background:#fef3c7}.h9{background:#ffedd5}.h10{background:#fee2e2}.h11{background:#ffe4e6}.h12{background:#fce7f3}
@media(max-width:900px){
  .app{padding:6px;gap:6px}
  .header{grid-template-columns:1fr auto auto}
  h1{font-size:16px}
  .top-card{grid-template-columns:1fr;padding:8px;gap:4px}
  .label{text-align:center;font-size:14px}
  .number{font-size:clamp(24px,7vw,42px)}
  .head{font-size:12px}
  .pow{font-size:9px}
  .ops{padding:4px;gap:4px}
  .op{font-size:13px;border-radius:7px}
}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <h1>位取りボード（整数：一兆の位まで）</h1>
    <button class="main-btn help" onclick="openHelp()">？使い方</button>
    <button class="main-btn clear" onclick="resetValue()">リセット</button>
  </header>

  <section class="top-card">
    <div class="label">現在の数</div>
    <div id="number" class="number">0</div>
  </section>

  <section class="board-wrap">
    <div id="board" class="board"></div>
  </section>
</div>

<dialog id="helpDialog">
  <div class="modal">
    <h2>使い方</h2>
    <ul>
      <li>＋1：その位の数字を1増やします。</li>
      <li>－1：その位の数字を1減らします。</li>
      <li>10個で上の位に繰り上がり、0から引くと繰り下がります。</li>
      <li>○は10個すべて縦に並び、入っている数だけ色が付きます。</li>
      <li>現在の数はコンマなしで、位ごとの色に対応しています。</li>
      <li>ボタン長押しで連続して増減できます。</li>
    </ul>
    <button class="close" onclick="closeHelp()">閉じる</button>
  </div>
</dialog>

<script>
const places = [
  {name:"一兆", pow:"10¹²", weight:1000000000000n},
  {name:"千億", pow:"10¹¹", weight:100000000000n},
  {name:"百億", pow:"10¹⁰", weight:10000000000n},
  {name:"十億", pow:"10⁹", weight:1000000000n},
  {name:"億", pow:"10⁸", weight:100000000n},
  {name:"千万", pow:"10⁷", weight:10000000n},
  {name:"百万", pow:"10⁶", weight:1000000n},
  {name:"十万", pow:"10⁵", weight:100000n},
  {name:"万", pow:"10⁴", weight:10000n},
  {name:"千", pow:"10³", weight:1000n},
  {name:"百", pow:"10²", weight:100n},
  {name:"十", pow:"10¹", weight:10n},
  {name:"一", pow:"10⁰", weight:1n}
];

const MAX = 9999999999999n;
const MIN = -9999999999999n;
let value = 0n;
let holdTimer = null;
let holdInterval = null;

function buildBoard(){
  const board = document.getElementById("board");
  board.innerHTML = "";
  places.forEach((p,i)=>{
    const el = document.createElement("div");
    el.className = "place";
    el.innerHTML = `
      <div class="head h${i} c${i}">
        <div>${p.name}</div>
        <div class="pow">(${p.pow})</div>
      </div>
      <div class="dots"><div id="dots${i}" class="dotbox"></div></div>
      <div id="count${i}" class="count">0</div>
      <div class="ops">
        <button class="op plus" data-i="${i}" data-d="1">＋1</button>
        <button class="op minus" data-i="${i}" data-d="-1">－1</button>
      </div>
    `;
    board.appendChild(el);
  });

  document.querySelectorAll(".op").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      change(Number(btn.dataset.i), Number(btn.dataset.d));
    });
    btn.addEventListener("pointerdown", (e)=>{
      e.preventDefault();
      const i = Number(btn.dataset.i);
      const d = Number(btn.dataset.d);
      holdTimer = setTimeout(()=>{
        holdInterval = setInterval(()=>change(i,d), 85);
      }, 420);
    });
    btn.addEventListener("pointerup", stopHold);
    btn.addEventListener("pointerleave", stopHold);
    btn.addEventListener("pointercancel", stopHold);
  });
}

function stopHold(){
  clearTimeout(holdTimer);
  clearInterval(holdInterval);
}

function change(index, direction){
  const next = value + BigInt(direction) * places[index].weight;
  if(next > MAX || next < MIN){
    flashLimit();
    return;
  }
  value = next;
  render();
}

function resetValue(){
  value = 0n;
  render();
}

function render(){
  const abs = value < 0n ? -value : value;
  document.getElementById("number").innerHTML = colorizedNumber(abs.toString(), value < 0n);

  places.forEach((p,i)=>{
    const digit = Number((abs / p.weight) % 10n);
    const dots = document.getElementById("dots"+i);
    dots.innerHTML = "";

    for(let n=10;n>=1;n--){
      const dot = document.createElement("span");
      if(n <= digit){
        dot.className = `dot filled b${i} c${i}`;
      }else{
        dot.className = `dot empty c${i}`;
      }
      dots.appendChild(dot);
    }

    const count = document.getElementById("count"+i);
    count.textContent = digit;
    count.className = `count c${i}`;
  });
}

function colorizedNumber(str, isNegative){
  const padded = str.padStart(13, "0");
  let firstNonZero = padded.search(/[1-9]/);
  if(firstNonZero === -1) firstNonZero = 12;

  let html = isNegative ? `<span class="minus-sign">−</span>` : "";
  for(let i=0;i<padded.length;i++){
    const ch = padded[i];
    const muted = i < firstNonZero ? " zero-muted" : "";
    html += `<span class="c${i}${muted}">${ch}</span>`;
  }
  return html;
}

function flashLimit(){
  const el = document.querySelector(".top-card");
  el.animate(
    [{transform:"translateX(0)"},{transform:"translateX(-6px)"},{transform:"translateX(6px)"},{transform:"translateX(0)"}],
    {duration:180}
  );
}

function openHelp(){
  document.getElementById("helpDialog").showModal();
}
function closeHelp(){
  document.getElementById("helpDialog").close();
}

document.addEventListener("keydown",(e)=>{
  if(e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;

  const key = e.key.toLowerCase();

  if(key === "escape"){
    const d = document.getElementById("helpDialog");
    if(d.open) d.close();
    return;
  }

  const numberMap = {
    "0":12, "1":11, "2":10, "3":9, "4":8,
    "5":7, "6":6, "7":5, "8":4, "9":3
  };
  if(key in numberMap){
    change(numberMap[key], e.shiftKey ? -1 : 1);
    return;
  }

  const plusHigh = {q:0,w:1,e:2,r:3};
  const minusHigh = {a:0,s:1,d:2,f:3};

  if(key in plusHigh){
    change(plusHigh[key],1);
  }else if(key in minusHigh){
    change(minusHigh[key],-1);
  }
});

buildBoard();
render();
</script>
</body>
</html>
